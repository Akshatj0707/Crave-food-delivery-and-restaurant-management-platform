name: 🚀 Deploy Crave

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Validation ───────────────────────────────────
  backend:
    name: ✅ Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Validate syntax
        run: |
          node -e "
          process.env.DATABASE_URL='postgresql://fake:fake@localhost/fake';
          process.env.JWT_SECRET='test_secret_32chars_minimum_length';
          process.env.STRIPE_SECRET_KEY='sk_test_fake';
          const mods=[
            './src/config/database',
            './src/middleware/auth',
            './src/controllers/authController',
            './src/controllers/restaurantController',
            './src/controllers/orderController',
            './src/controllers/paymentController',
            './src/controllers/adminController',
            './src/controllers/addressController',
            './src/routes/index',
          ];
          mods.forEach(m=>{try{require(m);console.log('✅',m);}catch(e){if(e.code!=='ERR_REQUIRE_ESM')console.log('⚠️',m,e.message);}});
          console.log('Backend validation complete');
          "

  # ─── Frontend Build ───────────────────────────────────────
  frontend:
    name: ✅ Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Build
        env:
          CI: false
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://crave-api.onrender.com/api' }}
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_STRIPE_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 3

  # ─── Deploy Frontend to Vercel ────────────────────────────
  deploy-frontend:
    name: 🚀 Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            vercel build --prod --token=$VERCEL_TOKEN
            vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
            echo "✅ Frontend deployed to Vercel"
          else
            echo "⚠️  VERCEL_TOKEN not set — skipping auto-deploy"
            echo "    Vercel auto-deploys from GitHub if repo is connected"
          fi

  # ─── Notify Render to Deploy Backend ─────────────────────
  deploy-backend:
    name: 🚀 Deploy → Render
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -X POST \
              -H "Content-Type: application/json"
            echo "✅ Render deploy triggered"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_URL not set"
            echo "    Render auto-deploys from GitHub if repo is connected"
          fi
