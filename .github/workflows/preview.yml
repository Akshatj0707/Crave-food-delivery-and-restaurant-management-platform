name: 🔍 PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'http://localhost:5000/api' }}
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_STRIPE_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          CI: false
        run: |
          npm ci
          npm run build

      - name: Deploy preview to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            npm install -g vercel
            PREVIEW_URL=$(vercel deploy --token=$VERCEL_TOKEN 2>&1 | tail -1)
            echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
            echo "Preview deployed: $PREVIEW_URL"
          fi

      - name: Comment PR with preview URL
        if: env.PREVIEW_URL != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment\n\n✅ Frontend preview: **${{ env.PREVIEW_URL }}**\n\n_Deployed from commit \`${{ github.sha }}\`_`
            })
